<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Store</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <strong>Book Store</strong>
    <nav>
      <button data-view="shop">Shop</button>
      <button data-view="cart">Cart <span id="cartCount">0</span></button>
      <button data-view="admin">Admin</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div>
        <h1>Simple real bookstore</h1>
        <p>ASP.NET Core API + SQLite database + browser UI.</p>
      </div>
      <div class="summary">
        <span id="bookCount">0 books</span>
        <span id="orderCount">0 orders</span>
      </div>
    </section>

    <section id="shop" class="view">
      <div class="toolbar">
        <input id="search" placeholder="Search books or authors">
        <select id="category"></select>
      </div>
      <div id="books" class="grid"></div>
    </section>

    <section id="cart" class="view hidden">
      <h2>Cart</h2>
      <label>Your name <input id="customerName" placeholder="Customer"></label>
      <div id="cartRows"></div>
      <div class="total">Total: <strong id="cartTotal">$0.00</strong></div>
      <button class="primary" id="placeOrder">Place order</button>
    </section>

    <section id="admin" class="view hidden">
      <h2>Admin</h2>
      <form id="bookForm" class="form">
        <input name="title" placeholder="Title" required>
        <input name="author" placeholder="Author" required>
        <input name="category" placeholder="Category" required>
        <input name="price" type="number" min="1" step="0.01" placeholder="Price" required>
        <input name="stock" type="number" min="0" step="1" placeholder="Stock" required>
        <button class="primary">Add book</button>
      </form>
      <h3>Orders</h3>
      <div id="orders"></div>
    </section>
  </main>

  <div id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
